name: CI / Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Opt into Node.js 24 action runners ahead of the June 16 2026 forced migration
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Type-check + Tests ────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: chatbot
          POSTGRES_PASSWORD: chatbot
          POSTGRES_DB: chatbot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15

    env:
      DATABASE_URL: postgres://chatbot:chatbot@localhost:5432/chatbot_test
      IP_HASH_SALT: ci-test-salt
      OPENAI_API_KEY: test-key-not-used-in-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Run migrations (test DB)
        run: npm run -w apps/backend migrate

      - name: Seed demo tenant
        run: npm run seed:demo

      - name: Run tests
        run: npm test

  # ── Widget build ──────────────────────────────────────────────────────────
  build-widget:
    name: Build widget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build widget
        run: npm run build:widget

      - name: Upload widget dist
        uses: actions/upload-artifact@v4
        with:
          name: widget-dist
          path: apps/widget/dist/

  # ── Deploy backend → Render ───────────────────────────────────────────────
  deploy-backend:
    name: Deploy backend (Render)
    needs: [test, build-widget]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "⚠️  RENDER_DEPLOY_HOOK secret not configured — skipping deploy trigger."
            exit 0
          fi
          curl -fsSL "$HOOK" \
            -o /dev/null \
            -w "HTTP %{http_code}\n"
