services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: bank-chatbot-pg
    environment:
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot
      POSTGRES_DB: chatbot
    ports:
      - "5433:5432"   # 5433 to avoid clash with any local Postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot -d chatbot"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
